<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Feedback | Crafted Experience</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Roboto', sans-serif;
}

/* 🌄 WALLPAPER */
body {
  background: url('Images/premium weaves.jpeg') no-repeat center center fixed;
  background-size: cover;
}

/* DARK OVERLAY */
.overlay {
  min-height: 100vh;
  background: rgba(0,0,0,0.6);
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.logo img {
  width: 55px;
  border-radius: 10px;
  border: 2px solid #fff;
}

/* ✅ CHANGED LOGO IMAGE */
.logo img {
  content: url("Media.JFIF");
}

.nav-list {
  display: flex;
  list-style: none;
}

.nav-list li {
  margin: 0 15px;
}

.nav-list a {
  color: #fff;
  text-decoration: none;
}

.nav-list a:hover {
  color: #f4a261;
}

/* TITLE */
.title {
  text-align: center;
  color: #fff;
  padding: 50px 20px 10px;
}

.title h1 {
  font-size: 2.5rem;
}

.title p {
  opacity: 0.8;
}

/* FORM */
.form-container {
  display: flex;
  justify-content: center;
  padding: 30px;
}

form {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 15px;
  width: 100%;
  max-width: 600px;
}

form h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #fff;
}

.row {
  display: flex;
  gap: 10px;
}

input, select, textarea {
  width: 100%;
  margin-bottom: 15px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
}

textarea {
  resize: none;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  background: #f4a261;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #fff;
  transform: scale(1.03);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #fff;
  color: #000;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
}

.modal-content button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #f4a261;
  cursor: pointer;
  border-radius: 6px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.5);
  color: #fff;
}
</style>
</head>

<body>

<div class="overlay">

<!-- HEADER -->
<header>
  <div class="logo">
    <!-- ✅ LOGO REPLACED -->
    <img src="Images/Media.JFIF" alt="Logo">
  </div>

  <ul class="nav-list">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="feedback.html" class="active">Feedback</a></li>
  </ul>
</header>

<!-- TITLE -->
<div class="title">
  <h1>We Value Your Feedback</h1>
  <p>Help us improve our experience</p>
</div>

<!-- FORM -->
<div class="form-container">
  <form>

    <h2>Feedback Form</h2>

    <div class="row">
      <input type="text" placeholder="First Name" required>
      <input type="text" placeholder="Last Name" required>
    </div>

    <div class="row">
      <input type="email" placeholder="Email Address" required>
      <input type="tel" placeholder="Phone Number">
    </div>

    <div class="row">
      <select>
        <option>Category</option>
        <option>Website</option>
        <option>Products</option>
        <option>Services</option>
      </select>

      <select>
        <option>Rating</option>
        <option>⭐⭐⭐⭐⭐</option>
        <option>⭐⭐⭐⭐</option>
        <option>⭐⭐⭐</option>
        <option>⭐⭐</option>
      </select>
    </div>

    <input type="text" placeholder="Subject">

    <textarea rows="5" placeholder="Write your feedback..."></textarea>

    <button type="submit">Submit Feedback</button>

  </form>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2>Thank You!</h2>
    <p>Your feedback has been submitted successfully.</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Crafted Creations | Designed Beyond Reality</p>
  <div class="social-icons">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-twitter"></i></a>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</div>

<!-- SCRIPT -->
<script>
const form = document.querySelector("form");
const modal = document.getElementById("modal");

form.addEventListener("submit", function(e){
  e.preventDefault();
  modal.style.display = "flex";
  form.reset();
});

function closeModal(){
  modal.style.display = "none";
}

window.onclick = function(e){
  if(e.target === modal){
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
